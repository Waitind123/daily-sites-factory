name: 更新静态看板

on:
  push:
    branches: [main]
    paths:
      - analytics/rollup.json
      - sites/factory-dashboard/**
      - scripts/build-static-dashboard.mjs
      - scripts/sync-dashboard-data.mjs
      - .github/workflows/dashboard-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-static
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build static dashboard
        run: |
          node scripts/extract-site-urls.mjs || true
          node scripts/sync-dashboard-data.mjs || true
          node scripts/build-static-dashboard.mjs
          touch dashboard-public/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard-public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Feishu notify
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then exit 0; fi
          URL="${{ steps.deployment.outputs.page_url }}"
          node -e "
            fetch(process.env.FEISHU_WEBHOOK_URL,{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({msg_type:'text',content:{text:'✅ 全站看板已上线\\n'+process.argv[1]+'\\n请收藏此地址'}})
            }).catch(()=>{});
          " "$URL"

name: 更新静态看板

on:
  push:
    branches: [main]
    paths:
      - analytics/rollup.json
      - sites/factory-dashboard/**
      - scripts/build-static-dashboard.mjs
      - scripts/sync-dashboard-data.mjs
      - .github/workflows/dashboard-pages.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-static
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build static dashboard
        run: |
          node scripts/extract-site-urls.mjs || true
          node scripts/sync-dashboard-data.mjs || true
          node scripts/build-static-dashboard.mjs
          touch dashboard-public/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard-public
          publish_branch: gh-pages
          force_orphan: true

      - name: Feishu notify
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then exit 0; fi
          URL="https://intercom-pulse.vercel.app/factory-dashboard/"
          node -e "
            fetch(process.env.FEISHU_WEBHOOK_URL,{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({msg_type:'text',content:{text:'✅ 全站看板已更新\\n主地址: '+process.argv[1]+'\\n备用: https://waitind123.github.io/daily-sites-factory/'}})
            }).catch(()=>{});
          " "$URL"

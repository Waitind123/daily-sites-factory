name: 更新静态看板（jsDelivr）

on:
  push:
    branches: [main]
    paths:
      - analytics/rollup.json
      - sites/factory-dashboard/**
      - scripts/build-static-dashboard.mjs
      - scripts/sync-dashboard-data.mjs
      - .github/workflows/dashboard-pages.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-static
  cancel-in-progress: false

jobs:
  build-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build static dashboard
        run: |
          node scripts/extract-site-urls.mjs || true
          node scripts/sync-dashboard-data.mjs || true
          node scripts/build-static-dashboard.mjs

      - name: Commit dashboard HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard-public/index.html
          git diff --staged --quiet && echo "看板无变化" && exit 0
          git commit -m "chore: update static dashboard [skip ci]"
          git push

      - name: Feishu notify
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then exit 0; fi
          URL="https://cdn.jsdelivr.net/gh/Waitind123/daily-sites-factory@main/dashboard-public/index.html"
          node -e "
            fetch(process.env.FEISHU_WEBHOOK_URL,{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({msg_type:'text',content:{text:'✅ 全站看板已更新\\n'+process.argv[1]+'\\n请收藏此地址'}})
            }).catch(()=>{});
          " "$URL"

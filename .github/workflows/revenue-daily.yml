name: 赚钱日报（流量+收款）

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Extract URLs
        run: node scripts/extract-site-urls.mjs

      - name: Bootstrap PV probe
        run: node scripts/bootstrap-pv-from-prod.mjs || true

      - name: Stripe live check
        id: stripe
        continue-on-error: true
        run: node scripts/verify-stripe-live.mjs

      - name: Feishu revenue report
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          HAS_STRIPE: ${{ secrets.STRIPE_SECRET_KEY != '' && 'yes' || 'no' }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then exit 0; fi
          node -e "
            const r=require('./analytics/rollup.json');
            const pv=Object.values(r.sites||{}).reduce((a,s)=>a+(s.totals?.pv||0),0);
            const stripeMsg=process.env.HAS_STRIPE==='yes'?'Stripe 密钥已配置':'⚠️ Stripe 未配置=演示付费，无法真收钱';
            fetch(process.env.FEISHU_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify({msg_type:'text',content:{text:'💰 赚钱日报\\n总PV: '+pv+'\\n'+stripeMsg+'\\n看板: https://intercom-pulse.vercel.app/factory-dashboard'}})})
            }).catch(()=>{});
          "

name: Promo multi-platform (no Reddit)

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: IndexNow + multi-platform promo pack
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: node scripts/promo-multi-platform.mjs

      - name: Commit promo artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics/promo/ 2>/dev/null || true
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "chore: daily multi-platform promo [skip deploy]"
          git push

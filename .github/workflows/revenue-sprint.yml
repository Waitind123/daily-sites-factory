name: Revenue sprint (12d goal)

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      redeploy_priority:
        description: "Redeploy priority sites for Stripe sync"
        type: boolean
        default: true

permissions:
  contents: read
  actions: write

jobs:
  sprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Extract deploy URLs
        run: node scripts/extract-site-urls.mjs

      - name: Stripe live check
        continue-on-error: true
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_PRODUCT_ID: ${{ secrets.POLAR_PRODUCT_ID }}
        run: node scripts/verify-stripe-live.mjs

      - name: Auto-fix revenue blockers (demo sites + Polar sync)
        env:
          GH_TOKEN: ${{ github.token }}
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_PRODUCT_ID: ${{ secrets.POLAR_PRODUCT_ID }}
        run: node scripts/revenue-sprint-autofix.mjs

      - name: Sprint report + share copy
        run: node scripts/revenue-sprint.mjs

      - name: Run promotion (IndexNow + share kit)
        run: node scripts/run-promotion.mjs || true

      - name: IndexNow (SEO push)
        run: node scripts/submit-indexnow.mjs || true

      - name: Redeploy revenue priority sites (fallback if autofix skipped)
        if: github.event_name == 'schedule' || inputs.redeploy_priority != false
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for site in ai-headshots intercom-pulse feature-vote coworking-finder remote-jobs; do
            gh workflow run deploy-site.yml -f site_id="$site" || true
            sleep 5
          done

      - name: Feishu sprint alert
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: node scripts/notify-feishu-revenue-sprint.mjs

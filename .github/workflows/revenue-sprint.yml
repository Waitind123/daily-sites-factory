name: Revenue sprint (12d goal)

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      redeploy_priority:
        description: "Redeploy priority sites for Stripe sync"
        type: boolean
        default: true

permissions:
  contents: read
  actions: write

jobs:
  sprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Extract deploy URLs
        run: node scripts/extract-site-urls.mjs

      - name: Stripe live check
        continue-on-error: true
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: node scripts/verify-stripe-live.mjs

      - name: Sprint report + share copy
        run: node scripts/revenue-sprint.mjs

      - name: Run promotion (IndexNow + share kit)
        run: node scripts/run-promotion.mjs || true

      - name: IndexNow (SEO push)
        run: node scripts/submit-indexnow.mjs || true

      - name: Redeploy Stripe priority sites
        if: |
          (github.event_name == 'schedule' || inputs.redeploy_priority != false) &&
          secrets.STRIPE_SECRET_KEY != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for site in intercom-pulse feature-vote ai-headshots; do
            gh workflow run deploy-site.yml -f site_id="$site" || true
            sleep 5
          done

      - name: Feishu sprint alert
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then exit 0; fi
          node -e "
            const s=require('./analytics/stripe-status.json');
            const r=require('./analytics/rollup.json');
            const st=require('./state.json');
            const dl=new Date((st.revenueGoal?.deadline||'2026-07-13')+'T23:59:59');
            const days=Math.max(0,Math.ceil((dl-Date.now())/86400000));
            let pv=0,purchase=0;
            for (const site of Object.values(r.sites||{})) {
              pv+=site.totals?.pv||0;
              purchase+=site.totals?.purchase||0;
            }
            const live=(s.liveSiteIds||[]).join(', ')||'none';
            fetch(process.env.FEISHU_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify({msg_type:'text',content:{text:'🎯 收入冲刺\\n剩余 '+days+' 天 · 目标 \$20\\n付费: '+purchase+' · PV: '+pv+'\\nLive Stripe: '+live+'\\n看板: https://intercom-pulse.vercel.app/factory-dashboard'}})})
            }).catch(()=>{});
          "

name: Deploy site on push

on:
  push:
    paths:
      - "sites/**"
    branches:
      - main
  workflow_dispatch:
    inputs:
      site_id:
        description: "Site folder name under sites/ (empty = all sites)"
        required: false
        type: string

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.list.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List sites to deploy
        id: list
        run: |
          if [ -n "${{ github.event.inputs.site_id }}" ]; then
            SITES='["${{ github.event.inputs.site_id }}"]'
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | sed 's/^"\|"$//g' | grep '^sites/' | cut -d/ -f2 | sort -u)
            if [ -z "$CHANGED" ]; then
              CHANGED=$(git show --name-only --pretty=format: HEAD | sed 's/^"\|"$//g' | grep '^sites/' | cut -d/ -f2 | sort -u)
            fi
            if [ -z "$CHANGED" ]; then
              echo "No sites to deploy" >&2
              exit 1
            fi
            SITES=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "sites=$SITES" >> $GITHUB_OUTPUT
          echo "Deploying: $SITES"

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site_id: ${{ fromJson(needs.resolve.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync dashboard data
        if: matrix.site_id == 'factory-dashboard'
        run: node scripts/sync-dashboard-data.mjs

      - name: Verify site quality
        if: matrix.site_id != 'factory-dashboard'
        run: node scripts/verify-site-quality.mjs ${{ matrix.site_id }}

      - name: Verify site quality (dashboard)
        if: matrix.site_id == 'factory-dashboard'
        run: echo "factory-dashboard is internal — skip product quality gate"

      - name: Install and build
        working-directory: sites/${{ matrix.site_id }}
        run: |
          npm ci || npm install
          npm run build

      - name: Visitor smoke test (guest, local)
        if: matrix.site_id != 'factory-dashboard'
        working-directory: sites/${{ matrix.site_id }}
        run: |
          npx next start -p 3099 &
          echo $! > /tmp/next-${{ matrix.site_id }}.pid
          sleep 10
          node ../../scripts/verify-site-visitor.mjs http://127.0.0.1:3099 ${{ matrix.site_id }}
          kill $(cat /tmp/next-${{ matrix.site_id }}.pid) 2>/dev/null || true

      - name: Playwright visitor E2E (real browser)
        if: matrix.site_id != 'factory-dashboard'
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install chromium --with-deps
          cd sites/${{ matrix.site_id }}
          npx next start -p 3099 &
          echo $! > /tmp/next-e2e-${{ matrix.site_id }}.pid
          sleep 10
          node ../../scripts/verify-site-visitor-e2e.mjs http://127.0.0.1:3099 ${{ matrix.site_id }}
          kill $(cat /tmp/next-e2e-${{ matrix.site_id }}.pid) 2>/dev/null || true

      - name: Deploy to Vercel
        id: vercel
        working-directory: sites/${{ matrix.site_id }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: baoyu18178053101-6131s-projects
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured, skipping deploy" >&2
            exit 1
          fi
          npx vercel link --yes --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN" || true
          DEPLOY_URL=$(npx vercel deploy --prod --yes --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN" 2>&1 | tee /dev/stderr | grep -oE 'https://[^ ]+\.vercel\.app' | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Notify Feishu
        if: success() && steps.vercel.outputs.url != ''
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_RECEIVE_ID }}
          FEISHU_RECEIVE_EMAIL: ${{ secrets.FEISHU_RECEIVE_EMAIL }}
          FEISHU_RECEIVE_ID_TYPE: ${{ secrets.FEISHU_RECEIVE_ID_TYPE }}
        run: |
          node scripts/notify-feishu.mjs "${{ matrix.site_id }}" "${{ steps.vercel.outputs.url }}"

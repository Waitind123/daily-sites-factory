name: Deploy site on push

on:
  push:
    paths:
      - "sites/**"
    branches:
      - main
  workflow_dispatch:
    inputs:
      site_id:
        description: "Site folder name under sites/"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve site id
        id: site
        run: |
          if [ -n "${{ github.event.inputs.site_id }}" ]; then
            SITE_ID="${{ github.event.inputs.site_id }}"
          else
            SITE_ID=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '^sites/' | cut -d/ -f2 | sort -u | tail -1)
          fi
          if [ -z "$SITE_ID" ]; then
            echo "Could not resolve site id" >&2
            exit 1
          fi
          echo "id=$SITE_ID" >> $GITHUB_OUTPUT
          echo "Resolved site: $SITE_ID"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Detect payment-enabled site
        id: payment
        run: |
          SITE="${{ steps.site.outputs.id }}"
          if [ -f "sites/$SITE/lib/stripe.ts" ] || [ -f "sites/$SITE/lib/payments.ts" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync Stripe env (payment sites)
        if: steps.payment.outputs.enabled == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: baoyu18178053101-6131s-projects
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "::warning::STRIPE_SECRET_KEY 未配置 — 站点将保持演示/Polar 模式"
            exit 0
          fi
          node scripts/sync-vercel-env.mjs "${{ steps.site.outputs.id }}" STRIPE_SECRET_KEY

      - name: Install and build
        working-directory: sites/${{ steps.site.outputs.id }}
        run: |
          npm ci || npm install
          npm run build

      - name: Deploy to Vercel
        id: vercel
        working-directory: sites/${{ steps.site.outputs.id }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: baoyu18178053101-6131s-projects
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured, skipping deploy" >&2
            exit 1
          fi
          npx vercel link --yes --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN" || true
          DEPLOY_URL=$(npx vercel deploy --prod --yes --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN" 2>&1 | tee /dev/stderr | grep -oE 'https://[^ ]+\.vercel\.app' | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Verify Stripe checkout (payment sites)
        if: steps.payment.outputs.enabled == 'true'
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "跳过 Stripe 验证（未配置密钥）"
            exit 0
          fi
          sleep 8
          node scripts/verify-stripe-checkout.mjs "${{ steps.site.outputs.id }}"

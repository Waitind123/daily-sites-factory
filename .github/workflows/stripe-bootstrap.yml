name: Stripe 全站接通

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/stripe-bootstrap.yml"
      - "config/stripe-pricing.json"
      - "scripts/sync-vercel-env.mjs"
      - "scripts/sync-stripe-all-sites.mjs"
      - "scripts/sync-stripe-29-all.mjs"
      - "scripts/verify-stripe-checkout.mjs"
      - "scripts/sites-payment-enabled.json"
      - "sites/**/lib/stripe.ts"
      - "sites/**/lib/payments.ts"

permissions:
  contents: read

concurrency:
  group: stripe-bootstrap
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.list.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          SITES=$(jq -c '.' scripts/sites-payment-enabled.json)
          echo "sites=$SITES" >> $GITHUB_OUTPUT
          echo "Payment sites: $(jq 'length' scripts/sites-payment-enabled.json)"

  sync-stripe-env:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        site_id: ${{ fromJson(needs.prepare.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Require Stripe secret
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "::error::请先在 GitHub Secrets 配置 STRIPE_SECRET_KEY"
            exit 1
          fi

      - name: Sync STRIPE_SECRET_KEY to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: baoyu18178053101-6131s-projects
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: node scripts/sync-vercel-env.mjs ${{ matrix.site_id }} STRIPE_SECRET_KEY

  summary:
    needs: sync-stripe-env
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "## Stripe 全站密钥已同步（$29/月）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "共 $(jq 'length' scripts/sites-payment-enabled.json) 个站点 · 代码 push 后由 Deploy site on push 自动部署" >> $GITHUB_STEP_SUMMARY
